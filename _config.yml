# Site
title: SocialLinker
description: "Личная визитка."
author: Vijor
lang: ru

# ponytail: project-page URL. For user page (user.github.io), set url + leave baseurl empty.
url: "https://vijorich.github.io"
baseurl: "/SocialLinker"

# Build
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Exclude
exclude:
  - README.md
  - AGENTS.md
