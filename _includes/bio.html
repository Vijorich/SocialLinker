<section class="section bio" id="bio">
  <h2 class="section-title" data-i18n="nav_bio">{{ site.data.locale.ru.nav_bio }}</h2>
  <div class="bio-content"
       data-i18n-bio
       data-bio-ru="{{ site.data.profile.bio.ru | markdownify | strip_newlines | escape }}"
       data-bio-en="{{ site.data.profile.bio.en | markdownify | strip_newlines | escape }}">
    {{ site.data.profile.bio.ru | markdownify }}
  </div>
</section>
