name: Stream Status

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Fetch stream status
        run: |
          mkdir -p assets
          
          DATA=$(curl -s -f "https://api.ivr.fi/v2/twitch/user?login=vijor" || echo "")
          
          if [ -z "$DATA" ]; then
            echo "❌ Ошибка: API не вернул данных. Пропускаем обновление."
            exit 1
          fi
          
          LIVE=$(echo "$DATA" | jq -r 'if .[0].stream != null then "true" else "false" end' 2>/dev/null || echo "false")
          
          echo "{\"live\": $LIVE}" > assets/stream-status.json
          
          echo "✅ Статус обновлен. Стрим онлайн: $LIVE"

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update stream status [skip ci]"
          file_pattern: assets/stream-status.json
